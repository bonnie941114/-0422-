<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卓配鏡 21 歲生日卡片 - 手機終極相容版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+Kuaile&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --sakura: #fdeff2;    
            --usubeni: #e87a90;   
            --y2k-pink: #ff00ff;  
            --meta-blue: #33ffff; 
            --gold: #ffd700;
            --fire-orange: #ff4500;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-dark);
            font-family: 'Press Start 2P', 'ZCOOL Kuaile', sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊陰影 */
        }

        /* 掃描線 */
        .scanlines {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        .frame-glow {
            padding: 6px;
            background: linear-gradient(90deg, var(--y2k-pink), var(--meta-blue));
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            z-index: 10;
        }

        /* 手機卡片寬度優化 */
        .card {
            width: 92vw; height: 400px;
            background: rgba(15, 15, 20, 0.98);
            border: 3px solid #fff;
            border-radius: 8px;
            display: flex; align-items: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
        }

        /* 文字內容：強制同一行 */
        .content {
            flex: 1.5;
            z-index: 30;
        }

        .title-line {
            display: flex;
            align-items: center;
            font-size: 1.2rem; /* 手機最適字體大小 */
            font-weight: 900;
            margin-bottom: 15px;
            white-space: nowrap; /* 絕對不換行 */
        }

        .gradient-name {
            background: linear-gradient(to bottom, var(--sakura), var(--usubeni));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px #000);
        }

        .hbd-white {
            color: #fff;
            filter: drop-shadow(2px 2px 0px #000);
            margin-left: 5px;
        }

        .message-list {
            color: #ccc;
            font-size: 9px;
            line-height: 1.8;
            white-space: normal;
        }
        .list-item { display: flex; align-items: flex-start; margin-bottom: 6px; }
        .heart-num {
            width: 16px; height: 16px;
            background: var(--y2k-pink);
            clip-path: polygon(50% 15%, 70% 0%, 100% 15%, 100% 60%, 50% 100%, 0% 60%, 0% 15%, 30% 0%);
            margin-right: 8px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 6px; flex-shrink: 0;
        }

        /* 蛋糕機關 */
        .visual { flex: 0.5; display: flex; justify-content: center; align-items: center; position: relative; }
        .pixel-cake {
            width: 80px; height: 60px;
            position: relative; transform: scale(0);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cake-body { width: 80px; height: 40px; background: #fff; border: 2px solid #000; position: absolute; bottom: 0; box-shadow: inset 0 -5px 0 var(--sakura); }
        .candle { width: 6px; height: 20px; background: var(--meta-blue); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); border: 1.5px solid #000; }
        .flame { width: 8px; height: 14px; background: var(--fire-orange); position: absolute; top: -16px; left: 50%; transform: translateX(-50%) scale(0); border-radius: 50% 50% 20% 20%; }

        .card.active .pixel-cake { transform: scale(1.1); }
        .card.active .flame { transform: translateX(-50%) scale(1); animation: flicker 0.2s infinite alternate; }

        @keyframes flicker { from { transform: translateX(-50%) scale(1) rotate(-2deg); } to { transform: translateX(-50%) scale(1.1) rotate(2deg); } }

        /* 人物驚喜 */
        .idol-surprise {
            position: absolute;
            width: 280px; right: -350px; bottom: -30px;
            transform: scale(0.9); opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        .card.active .idol-surprise { right: -20px; opacity: 1; transform: scale(1) rotate(-3deg); }

        .click-hint { position: absolute; bottom: 15px; left: 20px; color: var(--gold); font-size: 8px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="body-area">

    <div class="scanlines"></div>

    <div class="frame-glow">
        <div class="card" id="main-card">
            <div class="content">
                <span style="color:var(--meta-blue); font-size:7px; margin-bottom:12px; display:block;">✕ MOBILE_CORE_V4: STABLE</span>
                <div class="title-line">
                    <span class="gradient-name">卓配鏡</span>
                    <span class="hbd-white">生日快樂！！！</span>
                </div>
                <div class="message-list">
                    <div class="list-item"><div class="heart-num">1</div> 就這樣 21 歲了，認識好久了</div>
                    <div class="list-item"><div class="heart-num">2</div> 祝 老闆前額葉杏仁核完整</div>
                    <div class="list-item"><div class="heart-num">3</div> 繼續開開心心跟我度過女人</div>
                </div>
                <div class="click-hint">▶ PRESS TO START</div>
            </div>

            <div class="visual">
                <div class="pixel-cake">
                    <div class="candle"><div class="flame"></div></div>
                    <div class="cake-body"></div>
                </div>
            </div>

            <img src="image_b16160.png" class="idol-surprise" id="idol-img">
        </div>
    </div>

    <script>
        // 核心修正：全域 AudioContext 預創建
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let isActivated = false;

        function startSequence() {
            if (isActivated) return;
            isActivated = true;

            // 1. 立即初始化並解鎖 AudioContext
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // 2. 啟動視覺機關
            document.getElementById('main-card').classList.add('active');
            document.querySelector('.click-hint').style.display = 'none';

            // 3. 音樂播放
            playUpbeatMusic(audioCtx);
        }

        function playUpbeatMusic(ctx) {
            const gain = ctx.createGain();
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.06, ctx.currentTime);

            const G3 = 392, A3 = 440, B3 = 493.88, C4 = 523.25, D4 = 587.33, E4 = 659.25, F4 = 698.46, G4 = 783.99;
            const melody = [G3, G3, A3, G3, C4, B3, G3, G3, A3, G3, D4, C4, G3, G3, G4, E4, C4, B3, A3, F4, F4, E4, C4, D4, C4];
            const tempo = 0.22; 

            let offset = 0;
            melody.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const noteGain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, ctx.currentTime + offset);
                
                noteGain.gain.setValueAtTime(0.06, ctx.currentTime + offset);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + offset + tempo - 0.05);
                
                osc.connect(noteGain);
                noteGain.connect(ctx.destination);
                
                osc.start(ctx.currentTime + offset);
                osc.stop(ctx.currentTime + offset + tempo);
                offset += tempo;
            });
        }

        // 綁定所有可能觸發的手勢事件
        const trigger = document.getElementById('body-area');
        trigger.addEventListener('click', startSequence);
        trigger.addEventListener('touchend', startSequence);
    </script>
</body>
</html>
