<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卓配鏡 21 歲生日快樂！</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+Kuaile&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --sakura: #fdeff2;    
            --usubeni: #e87a90;   
            --y2k-pink: #ff00ff;  
            --meta-blue: #33ffff; 
            --gold: #ffd700;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-dark);
            font-family: 'Press Start 2P', 'ZCOOL Kuaile', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 20; pointer-events: none;
        }

        .frame-glow {
            padding: 8px; background: linear-gradient(90deg, var(--y2k-pink), var(--meta-blue));
            border-radius: 15px; box-shadow: 0 0 25px rgba(255, 0, 255, 0.4); z-index: 10;
        }

        .card {
            width: 90vw; max-width: 800px; height: 420px;
            background: rgba(15, 15, 20, 0.98); border: 3px solid #fff; border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .title-line {
            width: 100%; display: flex; justify-content: center; align-items: center;
            white-space: nowrap; font-size: clamp(1.1rem, 4.5vw, 1.8rem);
            font-weight: 900; margin-bottom: 25px;
        }

        .gradient-name {
            background: linear-gradient(to bottom, var(--sakura), var(--usubeni));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #000);
        }

        .hbd-white { color: #fff; filter: drop-shadow(4px 4px 0px #000); margin-left: 10px; }

        .message-box { color: #ccc; font-size: 10px; line-height: 2; text-align: center; margin-bottom: 30px; width: 85%; }

        .cake-box { width: 80px; height: 80px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; }
        .main-cake { font-size: 50px; opacity: 0.3; transition: 0.5s; }

        .card.active .main-cake {
            opacity: 1; transform: scale(1.6);
            animation: cakeBounce 1.5s infinite alternate;
            filter: drop-shadow(0 0 20px var(--gold));
        }

        @keyframes cakeBounce { from { transform: scale(1.5); } to { transform: scale(1.7); } }

        .click-hint {
            color: var(--gold); font-size: 9px; border: 1px solid var(--gold);
            padding: 10px 25px; border-radius: 30px; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="body-area">

    <div class="scanlines"></div>

    <audio id="hbd-audio" loop preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <div class="frame-glow" onclick="startParty()">
        <div class="card" id="main-card">
            <div class="cake-box">
                <div class="main-cake">🎂</div>
            </div>
            
            <div class="title-line">
                <span class="gradient-name">卓配鏡</span>
                <span class="hbd-white">生日快樂！！！</span>
            </div>

            <div class="message-box">
                就這樣 21 歲了，突然覺得認識好久了<br>
                祝 老闆前額葉杏仁核發展完完整整<br>
                繼續一起開開心心跟我度過這一年女人。
            </div>

            <div class="click-hint" id="hint">▶ TOUCH TO UNLOCK MUSIC ◀</div>
        </div>
    </div>

    <script>
        let audioCtx;

        function startParty() {
            const card = document.getElementById('main-card');
            const hint = document.getElementById('hint');

            // 1. 手機音訊解鎖最高級別寫法 (AudioContext)
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 2. 直接合成 8-bit 輕快完整音樂 (最穩，不依賴任何外部檔案)
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);

            const G3=392, A3=440, B3=493, C4=523, D4=587, E4=659, F4=698, G4=783;
            const melody = [G3,G3,A3,G3,C4,B3,G3,G3,A3,G3,D4,C4,G3,G3,G4,E4,C4,B3,A3,F4,F4,E4,C4,D4,C4];
            const tempo = 0.22; 
            const beats = [tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*4,tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*4,tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*2,tempo*4,tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*5];

            let offset = 0;
            melody.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + offset);
                noteGain.gain.setValueAtTime(0.06, audioCtx.currentTime + offset);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + offset + beats[i] - 0.05);
                osc.connect(noteGain);
                noteGain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + offset);
                osc.stop(audioCtx.currentTime + offset + beats[i]);
                offset += beats[i];
            });

            // 3. 視覺啟動
            card.classList.add('active');
            hint.style.display = 'none';
        }
    </script>
</body>
</html>
