<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卓配鏡 21 歲生日卡片</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+Kuaile&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --sakura: #fdeff2;    
            --usubeni: #e87a90;   
            --y2k-pink: #ff00ff;  
            --meta-blue: #33ffff; 
            --gold: #ffd700;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-dark);
            font-family: 'Press Start 2P', 'ZCOOL Kuaile', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; z-index: 20; pointer-events: none;
        }

        .frame-glow {
            padding: 8px;
            background: linear-gradient(90deg, var(--y2k-pink), var(--meta-blue));
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.4);
            z-index: 10;
        }

        .card {
            width: 90vw; max-width: 800px; height: 380px;
            background: rgba(15, 15, 20, 0.98);
            border: 3px solid #fff; border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        /* 標題：粉色漸層內容 + 凹凸效果 (強制一行) */
        .title-line {
            font-size: 1.6rem; font-weight: 900; margin-bottom: 20px;
            display: flex; white-space: nowrap;
        }
        .gradient-name {
            background: linear-gradient(to bottom, var(--sakura), var(--usubeni));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 0px #000);
        }
        .hbd-white { color: #fff; filter: drop-shadow(3px 3px 0px #000); margin-left: 8px; }

        .message-box {
            color: #ccc; font-size: 10px; line-height: 1.8;
            text-align: center; margin-bottom: 30px;
        }

        /* 蛋糕與星星機關 */
        .visual-box { position: relative; height: 80px; width: 80px; margin-bottom: 20px; }
        .cake { font-size: 45px; transition: 0.5s; }
        .star { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 40px; color: var(--gold); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.active .cake { transform: scale(0); opacity: 0; }
        .card.active .star { transform: translate(-50%, -50%) scale(1.5) rotate(360deg); opacity: 1; }

        .click-hint {
            color: var(--gold); font-size: 10px; border: 1px solid var(--gold);
            padding: 8px 20px; border-radius: 30px; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="body">

    <div class="scanlines"></div>

    <div class="frame-glow">
        <div class="card" id="main-card">
            <div class="visual-box">
                <div class="cake">🎂</div>
                <div class="star">🌟</div>
            </div>
            
            <div class="title-line">
                <span class="gradient-name">卓配鏡</span><span class="hbd-white">生日快樂！！！</span>
            </div>

            <div class="message-box">
                就這樣 21 歲了，突然覺得認識好久了<br>
                祝 老闆前額葉杏仁核發展完完整整<br>
                繼續一起開開心心跟我度過這一年女人。
            </div>

            <div class="click-hint" id="hint">▶ PRESS TO START PARTY</div>
        </div>
    </div>

    <script>
        // 核心修正：極簡化音樂觸發，避開所有異步調用
        const body = document.getElementById('body');
        const card = document.getElementById('main-card');
        const hint = document.getElementById('hint');

        body.addEventListener('click', function() {
            // 1. 立即創建音訊上下文（這步在點擊當下完成，手機才會認可）
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            
            // 2. 啟動視覺機關
            card.classList.add('active');
            hint.style.display = 'none';

            // 3. 直接在當前執行緒播放音樂
            const gain = ctx.createGain();
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);

            // 輕快 Happy Birthday 旋律代碼
            const G3=392, A3=440, B3=493, C4=523, D4=587, E4=659, G4=783;
            const melody = [G3,G3,A3,G3,C4,B3,G3,G3,A3,G3,D4,C4,G3,G3,G4,E4,C4,B3,A3];
            const beats = [0.2,0.2,0.4,0.4,0.4,0.6,0.2,0.2,0.4,0.4,0.4,0.6,0.2,0.2,0.4,0.4,0.4,0.4,0.8];

            let time = ctx.currentTime;
            melody.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                osc.type = 'square'; // 輕快像素音色
                osc.frequency.setValueAtTime(freq, time);
                osc.connect(gain);
                osc.start(time);
                osc.stop(time + beats[i] - 0.05);
                time += beats[i];
            });
        }, { once: true }); // 確保只觸發一次，防止重複疊加聲音
    </script>
</body>
</html>
