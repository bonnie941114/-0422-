<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卓配鏡 21 歲生日快樂！</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+Kuaile&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --sakura: #fdeff2;    
            --usubeni: #e87a90;   
            --y2k-pink: #ff00ff;  
            --meta-blue: #33ffff; 
            --gold: #ffd700;
            --flame: #ff4500;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-dark);
            font-family: 'Press Start 2P', 'ZCOOL Kuaile', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 20; pointer-events: none;
        }

        .frame-glow {
            padding: 8px; background: linear-gradient(90deg, var(--y2k-pink), var(--meta-blue));
            border-radius: 15px; box-shadow: 0 0 25px rgba(255, 0, 255, 0.4); z-index: 10;
        }

        .card {
            width: 90vw; max-width: 800px; height: 440px;
            background: rgba(15, 15, 20, 0.98); border: 3px solid #fff; border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        /* 標題需求：卓配鏡同一行 + 漸層內容 + 凹凸效果 */
        .title-line {
            width: 100%; display: flex; justify-content: center; align-items: center;
            white-space: nowrap; font-size: clamp(1rem, 4.5vw, 1.8rem);
            font-weight: 900; margin-bottom: 25px;
        }
        .gradient-name {
            background: linear-gradient(to bottom, var(--sakura), var(--usubeni));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #000);
        }
        .hbd-white { color: #fff; filter: drop-shadow(4px 4px 0px #000); margin-left: 10px; }

        /* 生日蛋糕機關安排 */
        .cake-container {
            width: 120px; height: 120px; margin-bottom: 20px;
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }
        
        /* 蠟燭 */
        .candle {
            width: 10px; height: 30px; background: var(--meta-blue);
            border: 2px solid #fff; position: relative; z-index: 2; opacity: 0.3; transition: 0.5s;
        }
        /* 燭火：初始不顯示 */
        .flame {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%) scale(0);
            width: 12px; height: 20px; background: var(--flame);
            border-radius: 50% 50% 20% 20%; transition: 0.3s;
        }

        /* 蛋糕主體 */
        .cake-body {
            width: 100px; height: 50px; background: #fff;
            border: 4px solid #fff; box-shadow: 0 5px 0 var(--usubeni);
            opacity: 0.3; transition: 0.5s;
        }

        /* 啟動狀態視覺 */
        .card.active .cake-body, .card.active .candle { opacity: 1; }
        .card.active .flame { 
            transform: translateX(-50%) scale(1);
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 20px var(--gold);
        }
        .card.active .cake-container { animation: jump 0.4s infinite alternate; }

        @keyframes flicker { from { opacity: 0.8; } to { opacity: 1; transform: translateX(-50%) scale(1.1); } }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .message-box { color: #ccc; font-size: 10px; line-height: 2; text-align: center; margin-bottom: 30px; width: 85%; }
        .click-hint { color: var(--gold); font-size: 9px; border: 1px solid var(--gold); padding: 10px 25px; border-radius: 30px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="body-area">

    <div class="scanlines"></div>

    <div class="frame-glow" onclick="playPerfectSurprise()">
        <div class="card" id="main-card">
            <div class="cake-container">
                <div class="candle">
                    <div class="flame"></div>
                </div>
                <div class="cake-body"></div>
            </div>
            
            <div class="title-line">
                <span class="gradient-name">卓配鏡</span>
                <span class="hbd-white">生日快樂！！！</span>
            </div>

            <div class="message-box">
                就這樣 21 歲了，突然覺得認識好久了<br>
                祝 老闆前額葉杏仁核發展完完整整<br>
                繼續一起開開心心跟我度過這一年女人。
            </div>

            <div class="click-hint" id="hint">▶ TOUCH TO START PARTY</div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function playPerfectSurprise() {
            // 1. 強制解鎖手機音訊上下文 (最高優先級)
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 2. 啟動視覺機關
            document.getElementById('main-card').classList.add('active');
            document.getElementById('hint').style.display = 'none';

            // 3. 合成超輕快 8-bit 生日旋律 (BPM 140)
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);

            const G3=392, A3=440, B3=493, C4=523, D4=587, E4=659, F4=698, G4=783;
            const melody = [G3,G3,A3,G3,C4,B3,G3,G3,A3,G3,D4,C4,G3,G3,G4,E4,C4,B3,A3,F4,F4,E4,C4,D4,C4];
            
            // 調整為更輕快的速度
            const tempo = 0.2; 
            const beats = [tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*4,tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*4,tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*2,tempo*4,tempo,tempo,tempo*2,tempo*2,tempo*2,tempo*6];

            let offset = 0;
            melody.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                
                osc.type = 'square'; // 清脆像素感
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + offset);
                
                noteGain.gain.setValueAtTime(0.06, audioCtx.currentTime + offset);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + offset + beats[i] - 0.05);
                
                osc.connect(noteGain);
                noteGain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + offset);
                osc.stop(audioCtx.currentTime + offset + beats[i]);
                offset += beats[i];
            });
        }
    </script>
</body>
</html>
