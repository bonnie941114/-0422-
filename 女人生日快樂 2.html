<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>卓配鏡 21 歲生日卡片 - 蛋糕慶生版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+Kuaile&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --sakura: #fdeff2;    
            --usubeni: #e87a90;   
            --y2k-pink: #ff00ff;  
            --meta-blue: #33ffff; 
            --gold: #ffd700;
            --fire-orange: #ff4500;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-dark);
            font-family: 'Press Start 2P', 'ZCOOL Kuaile', sans-serif;
            cursor: pointer;
        }

        /* 背景掃描線 */
        .scanlines {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        /* 霓虹邊框 */
        .frame-glow {
            padding: 8px;
            background: linear-gradient(90deg, var(--y2k-pink), var(--meta-blue));
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
            z-index: 10;
        }

        .card {
            width: 880px; height: 420px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(25px);
            border: 4px solid #fff;
            border-radius: 10px;
            display: flex; align-items: center;
            padding: 0 50px;
            position: relative;
            overflow: hidden;
        }

        /* 文字：同一行 + 漸層 + 凹凸 */
        .content {
            flex: 1.2;
            z-index: 30;
            white-space: nowrap;
        }

        .title-line {
            display: flex;
            align-items: center;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .gradient-name {
            background: linear-gradient(to bottom, var(--sakura), var(--usubeni));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #000) drop-shadow(-1px -1px 0px rgba(255,255,255,0.3));
        }

        .hbd-white {
            color: #fff;
            filter: drop-shadow(4px 4px 0px #000);
            margin-left: 10px;
        }

        .message-list {
            color: #ccc;
            font-size: 10px;
            line-height: 2.2;
            white-space: normal;
        }
        .list-item { display: flex; align-items: flex-start; margin-bottom: 10px; }
        .heart-num {
            width: 20px; height: 20px;
            background: var(--y2k-pink);
            clip-path: polygon(50% 15%, 70% 0%, 100% 15%, 100% 60%, 50% 100%, 0% 60%, 0% 15%, 30% 0%);
            margin-right: 12px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 8px; flex-shrink: 0;
        }

        /* ---------------------------------
           純 CSS 像素蛋糕機關
        --------------------------------- */
        .visual {
            flex: 0.8;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .pixel-cake {
            width: 120px; height: 100px;
            position: relative;
            transform: scale(0); /* 初始隱藏 */
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        /* 蛋糕底層 */
        .cake-body {
            width: 120px; height: 60px;
            background: #fff; /* 奶油色 */
            position: absolute; bottom: 0;
            border: 4px solid #000;
            box-shadow: inset 0 -10px 0 var(--sakura), 5px 5px 0 rgba(0,0,0,0.5);
        }
        /* 夾層奶油 */
        .cake-body::before {
            content: ''; position: absolute;
            width: 100%; height: 10px;
            background: var(--usubeni);
            top: 20px;
        }

        /* 蠟燭 */
        .candle {
            width: 10px; height: 30px;
            background: var(--meta-blue);
            position: absolute; top: -30px; left: 50%;
            transform: translateX(-50%);
            border: 3px solid #000;
        }

        /* 燭火：平常不亮 */
        .flame {
            width: 12px; height: 18px;
            background: var(--fire-orange);
            position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%) scale(0);
            border-radius: 50% 50% 20% 20%;
            transition: 0.3s 0.8s; /* 音樂響起後亮起 */
        }

        /* 啟動狀態 */
        .card.active .pixel-cake {
            transform: scale(1.2);
            opacity: 1;
        }
        .card.active .flame {
            transform: translateX(-50%) scale(1);
            animation: flicker 0.2s infinite alternate;
            box-shadow: 0 0 15px var(--fire-orange), 0 0 30px var(--gold);
        }

        @keyframes flicker {
            from { transform: translateX(-50%) scale(1) rotate(-2deg); }
            to { transform: translateX(-50%) scale(1.1) rotate(2deg); }
        }

        /* 霸總休寧凱降臨 */
        .idol-surprise {
            position: absolute;
            width: 360px; right: -450px; bottom: -50px;
            transform: scale(0.8); opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        .card.active .idol-surprise {
            right: -20px; opacity: 1;
            transform: scale(1.1) rotate(-3deg);
            filter: drop-shadow(0 0 30px var(--gold));
        }

        .click-hint {
            position: absolute; bottom: 30px; left: 50px;
            color: var(--gold); font-size: 9px; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="frame-glow" onclick="playUpbeatSurprise()">
        <div class="card" id="main-card">
            
            <div class="content">
                <span style="color:var(--meta-blue); font-size:9px; margin-bottom:20px; display:block;">✕ SYSTEM: CAKE_READY | MUSIC_START</span>
                
                <div class="title-line">
                    <span class="gradient-name">卓配鏡</span>
                    <span class="hbd-white">生日快樂！！！</span>
                </div>
                
                <div class="message-list">
                    <div class="list-item"><div class="heart-num">1</div> 就這樣 21 歲了，突然覺得認識好久了</div>
                    <div class="list-item"><div class="heart-num">2</div> 祝 老闆前額葉杏仁核發展完完整整，教授咪挺甚麼都過</div>
                    <div class="list-item"><div class="heart-num">3</div> 繼續一起開開心心跟我度過這一年女人。</div>
                </div>

                <div class="click-hint">▶ CLICK TO LIGHT THE CANDLE</div>
            </div>

            <div class="visual">
                <div class="pixel-cake">
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="cake-body"></div>
                </div>
            </div>

            <img src="image_b16160.png" class="idol-surprise" alt="偶像降臨">
            
        </div>
    </div>

    <script>
        function playUpbeatSurprise() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);

            // 輕快版節奏 Happy Birthday
            const G3 = 392, A3 = 440, B3 = 493.88, C4 = 523.25, D4 = 587.33, E4 = 659.25, F4 = 698.46, G4 = 783.99;
            const melody = [G3, G3, A3, G3, C4, B3, G3, G3, A3, G3, D4, C4, G3, G3, G4, E4, C4, B3, A3, F4, F4, E4, C4, D4, C4];
            
            // 輕快 Tempo (0.2s 一拍)
            const tempo = 0.22; 
            const times = [tempo, tempo, tempo*2, tempo*2, tempo*2, tempo*3, tempo, tempo, tempo*2, tempo*2, tempo*2, tempo*3, tempo, tempo, tempo*2, tempo*2, tempo*2, tempo*2, tempo*3, tempo, tempo, tempo*2, tempo*2, tempo*2, tempo*4];

            let offset = 0;
            melody.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'square'; // 清脆像素音色
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + offset);
                
                const noteGain = audioCtx.createGain();
                noteGain.gain.setValueAtTime(0.06, audioCtx.currentTime + offset);
                noteGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + offset + times[i] - 0.05);
                
                osc.connect(noteGain);
                noteGain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + offset);
                osc.stop(audioCtx.currentTime + offset + times[i]);
                offset += times[i];
            });

            // 觸發視覺機關
            document.getElementById('main-card').classList.add('active');
            document.querySelector('.click-hint').style.display = 'none';
        }
    </script>

</body>
</html>
